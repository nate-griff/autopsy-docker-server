[global]
    server string = samba
    idmap config * : range = 3000-7999
    security = user
    server min protocol = SMB2

    # Keep the image defaults for compatibility, but enable a few conservative
    # throughput-oriented settings for larger evidence files.
    load printers = no
    printing = bsd
    printcap name = /dev/null
    disable spoolss = yes
    host msdfs = no
    wide links = yes
    follow symlinks = yes
    unix extensions = no
    acl allow execute always = yes
    ea support = yes

    vfs objects = catia fruit streams_xattr
    fruit:resource = file
    fruit:metadata = stream
    fruit:locking = netatalk
    fruit:encoding = native
    fruit:model = TimeCapsule
    fruit:aapl = yes

    mangled names = no
    dos charset = CP850
    unix charset = UTF-8

    use sendfile = yes
    min receivefile size = 16384
    aio read size = 1
    aio write size = 1
    getwd cache = yes

[Autopsy]
    path = /storage
    comment = Shared
    browseable = yes
    writable = yes
    read only = no
